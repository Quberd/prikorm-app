<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7">
<link rel="manifest" href="manifest.json">
<title>Прикорм</title>
<style>
:root {
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --text2: #3C3C43;
  --text3: #8E8E93;
  --separator: rgba(60,60,67,0.1);
  --blue: #007AFF;
  --green: #34C759;
  --orange: #FF9500;
  --red: #FF3B30;
  --purple: #AF52DE;
  --pink: #FF2D55;
  --teal: #5AC8FA;
  --indigo: #5856D6;
  --fill: rgba(120,120,128,0.08);
  --fill2: rgba(120,120,128,0.16);
  --radius: 14px;
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 430px; margin: 0 auto;
  min-height: 100vh; padding-bottom: 90px;
  -webkit-tap-highlight-color: transparent;
}

/* iOS-style large title header */
.header {
  padding: 60px 20px 16px; background: var(--bg);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header h1 {
  font-size: 34px; font-weight: 700; letter-spacing: -0.4px; color: var(--text);
}
.header .subtitle {
  font-size: 15px; color: var(--text3); margin-top: 2px; font-weight: 400;
}

/* Bottom tab bar */
.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(249,249,249,0.94);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; justify-content: space-around;
  padding: 6px 0 28px; z-index: 100;
  border-top: 0.5px solid var(--separator);
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; color: var(--text3); cursor: pointer;
  padding: 4px 0; border: none; background: none;
  font-family: inherit; font-weight: 500; transition: color 0.15s;
}
.tab-item.active { color: var(--blue); }
.tab-item .icon { font-size: 24px; height: 28px; display: flex; align-items: center; }

/* Pages */
.page { display: none; padding: 0 16px; }
.page.active { display: block; }

/* iOS grouped list */
.section-header {
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 24px 4px 8px;
}
.grouped-card {
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 8px;
}
.grouped-card .row {
  display: flex; align-items: center; padding: 12px 16px; gap: 12px;
  min-height: 44px; position: relative;
}
.grouped-card .row:not(:last-child)::after {
  content: ''; position: absolute; bottom: 0; left: 56px; right: 0;
  height: 0.5px; background: var(--separator);
}
.row-icon { font-size: 28px; width: 36px; text-align: center; flex-shrink: 0; }
.row-content { flex: 1; min-width: 0; }
.row-title { font-size: 17px; font-weight: 400; color: var(--text); }
.row-subtitle { font-size: 13px; color: var(--text3); margin-top: 1px; }
.row-accessory { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; }
.acc-green { background: rgba(52,199,89,0.12); color: var(--green); }
.acc-orange { background: rgba(255,149,0,0.12); color: var(--orange); }
.acc-red { background: rgba(255,59,48,0.12); color: var(--red); }

/* Age picker */
.age-picker {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 14px;
}
.age-picker .emoji { font-size: 44px; }
.age-picker .info { flex: 1; }
.age-picker .info h3 { font-size: 20px; font-weight: 600; }
.age-picker .info p { font-size: 13px; color: var(--text3); margin-top: 2px; }
.age-picker select {
  padding: 8px 12px; border-radius: 8px;
  background: var(--fill); border: none;
  font-size: 15px; font-weight: 600; color: var(--blue);
  font-family: inherit; cursor: pointer;
  -webkit-appearance: none; appearance: none;
}

/* Tip card */
.tip-card {
  background: linear-gradient(135deg, rgba(0,122,255,0.08), rgba(88,86,214,0.08));
  border-radius: var(--radius); padding: 16px; margin: 8px 0;
}
.tip-card .label { font-size: 13px; font-weight: 600; color: var(--blue); margin-bottom: 6px; }
.tip-card .text { font-size: 15px; color: var(--text2); line-height: 1.45; }

/* Stat pills */
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-pill {
  flex: 1; background: var(--card); border-radius: var(--radius);
  padding: 14px 12px; text-align: center;
}
.stat-pill .value { font-size: 28px; font-weight: 700; color: var(--blue); }
.stat-pill .label { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; }

/* Tracker date nav */
.date-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.date-nav h3 { font-size: 20px; font-weight: 600; }
.date-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--fill); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--blue); font-weight: 600;
}

/* Meal sections */
.meal-label {
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 16px 4px 8px; display: flex; align-items: center; gap: 6px;
}
.logged-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); padding: 12px 16px; border-radius: 12px; margin-bottom: 6px;
}
.logged-item .name { font-size: 15px; font-weight: 400; }
.logged-item .amount { font-size: 13px; color: var(--text3); }
.del-btn {
  width: 22px; height: 22px; border: none; background: rgba(255,59,48,0.12);
  color: var(--red); border-radius: 50%; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}

.add-btn {
  width: 100%; padding: 12px; border: none; border-radius: 12px;
  background: var(--fill); color: var(--blue); font-size: 15px;
  font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background 0.15s; margin-bottom: 4px;
}
.add-btn:active { background: var(--fill2); }

/* Modal (iOS sheet style) */
.modal-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.modal-bg.active { display: flex; }
.sheet {
  background: var(--bg); width: 100%; max-width: 430px;
  border-radius: 14px 14px 0 0; max-height: 85vh; overflow-y: auto;
}
.sheet-handle {
  width: 36px; height: 5px; background: rgba(60,60,67,0.3);
  border-radius: 3px; margin: 8px auto 0;
}
.sheet-content { padding: 20px; }
.sheet-content h3 { font-size: 20px; font-weight: 600; margin-bottom: 16px; text-align: center; }

.food-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;
}
.food-cell {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 4px; border-radius: 12px; cursor: pointer;
  background: var(--card); font-size: 12px; text-align: center;
  font-family: inherit; border: 2px solid transparent;
  transition: all 0.15s;
}
.food-cell.selected { border-color: var(--blue); background: rgba(0,122,255,0.06); }
.food-cell .emoji { font-size: 28px; }

.input-field {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: var(--card); font-size: 17px; text-align: center;
  font-family: inherit; color: var(--text); margin-bottom: 12px; outline: none;
}
.input-field::placeholder { color: var(--text3); }

.btn-primary {
  width: 100%; padding: 16px; background: var(--blue); color: white;
  border: none; border-radius: 14px; font-size: 17px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-primary:active { opacity: 0.85; }
.btn-secondary {
  width: 100%; padding: 14px; background: none; color: var(--blue);
  border: none; font-size: 17px; font-weight: 400; cursor: pointer;
  font-family: inherit; margin-top: 4px;
}

/* Symptom chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.chip {
  padding: 8px 16px; border-radius: 20px; font-size: 14px;
  cursor: pointer; background: var(--card); border: 1.5px solid var(--separator);
  font-family: inherit; color: var(--text); transition: all 0.15s;
}
.chip.selected { background: var(--red); color: white; border-color: var(--red); }

/* Allergy items */
.allergy-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  border-left: 4px solid var(--orange);
}
.allergy-card .emoji { font-size: 28px; }
.allergy-card .info { flex: 1; }
.allergy-card .food { font-size: 15px; font-weight: 600; }
.allergy-card .symptoms { font-size: 13px; color: var(--red); margin-top: 2px; }
.allergy-card .date { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Recipes */
.recipe-card {
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 8px; cursor: pointer;
}
.recipe-top {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
}
.recipe-top .emoji { font-size: 40px; }
.recipe-top .title { font-size: 17px; font-weight: 600; }
.recipe-top .meta { font-size: 13px; color: var(--text3); margin-top: 2px; }
.recipe-tags { display: flex; gap: 6px; margin-top: 6px; }
.recipe-tag {
  font-size: 11px; padding: 3px 8px; border-radius: 6px;
  background: rgba(0,122,255,0.08); color: var(--blue); font-weight: 500;
}
.recipe-body {
  padding: 0 16px 16px; display: none;
  font-size: 15px; line-height: 1.5; color: var(--text2);
}
.recipe-body.open { display: block; }
.recipe-body h4 {
  font-size: 13px; font-weight: 600; color: var(--blue);
  text-transform: uppercase; letter-spacing: 0.3px;
  margin: 12px 0 6px; padding-top: 12px;
  border-top: 0.5px solid var(--separator);
}
.recipe-body h4:first-child { border-top: none; padding-top: 0; }

/* Filter pills */
.filter-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding: 8px 0 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-pill {
  flex-shrink: 0; padding: 8px 18px; border-radius: 20px;
  border: none; background: var(--fill); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; color: var(--text2);
  transition: all 0.15s;
}
.filter-pill.active { background: var(--blue); color: white; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; }
.empty .icon { font-size: 52px; margin-bottom: 12px; }
.empty p { font-size: 15px; color: var(--text3); }

/* Notification toast */
#toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(28,28,30,0.92); color: white;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 12px 24px; border-radius: 14px; font-size: 15px;
  display: none; z-index: 300; font-weight: 500;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}
#toast.show { display: block; animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* Level up */
#levelup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 36px; font-weight: 700; color: var(--blue); display: none;
  text-align: center; z-index: 300;
}
</style>
</head>
<body>

<div class="header">
  <h1 id="page-title">Прикорм</h1>
  <div class="subtitle" id="page-subtitle">Календарь прикорма с 6 месяцев</div>
</div>

<!-- ====== CALENDAR ====== -->
<div class="page active" id="page-calendar">
  <div class="age-picker">
    <div class="emoji">👶</div>
    <div class="info">
      <h3 id="age-text">6 месяцев</h3>
      <p>Возраст малыша</p>
    </div>
    <select id="age-sel" onchange="setAge(this.value)">
      <option value="6">6 мес</option><option value="7">7 мес</option>
      <option value="8">8 мес</option><option value="9">9 мес</option>
      <option value="10">10 мес</option><option value="11">11 мес</option>
      <option value="12">12+ мес</option>
    </select>
  </div>

  <div class="section-header">Продукты для введения</div>
  <div class="grouped-card" id="product-list"></div>

  <div class="tip-card" id="tip-card">
    <div class="label">Совет</div>
    <div class="text" id="tip-text">Начинайте с одного нового продукта каждые 3-5 дней.</div>
  </div>
</div>

<!-- ====== TRACKER ====== -->
<div class="page" id="page-tracker">
  <div class="date-nav">
    <button class="date-btn" onclick="shiftDate(-1)">&lsaquo;</button>
    <h3 id="date-text">Сегодня</h3>
    <button class="date-btn" onclick="shiftDate(1)">&rsaquo;</button>
  </div>

  <div class="stats-row">
    <div class="stat-pill"><div class="value" id="s-meals">0</div><div class="label">Приемов</div></div>
    <div class="stat-pill"><div class="value" id="s-items">0</div><div class="label">Продуктов</div></div>
    <div class="stat-pill"><div class="value" id="s-ml">0</div><div class="label">мл / г</div></div>
  </div>

  <div class="meal-label">🌅 Завтрак</div>
  <div id="m-breakfast"></div>
  <button class="add-btn" onclick="openAdd('breakfast')">Добавить</button>

  <div class="meal-label">☀️ Обед</div>
  <div id="m-lunch"></div>
  <button class="add-btn" onclick="openAdd('lunch')">Добавить</button>

  <div class="meal-label">🌙 Ужин</div>
  <div id="m-dinner"></div>
  <button class="add-btn" onclick="openAdd('dinner')">Добавить</button>

  <div class="meal-label">🍼 Перекус</div>
  <div id="m-snack"></div>
  <button class="add-btn" onclick="openAdd('snack')">Добавить</button>
</div>

<!-- ====== ALLERGY ====== -->
<div class="page" id="page-allergy">
  <button class="add-btn" style="margin-bottom:12px" onclick="openAllergySheet()">Записать реакцию</button>
  <div id="allergy-list">
    <div class="empty" id="allergy-empty"><div class="icon">✅</div><p>Реакций не зафиксировано</p></div>
  </div>
</div>

<!-- ====== RECIPES ====== -->
<div class="page" id="page-recipes">
  <div class="filter-scroll" id="recipe-filters">
    <button class="filter-pill active" onclick="filterR('all',this)">Все</button>
    <button class="filter-pill" onclick="filterR(6,this)">6+ мес</button>
    <button class="filter-pill" onclick="filterR(7,this)">7+ мес</button>
    <button class="filter-pill" onclick="filterR(8,this)">8+ мес</button>
    <button class="filter-pill" onclick="filterR(10,this)">10+ мес</button>
    <button class="filter-pill" onclick="filterR(12,this)">12+ мес</button>
  </div>
  <div id="recipe-list"></div>
</div>

<!-- ====== MODALS ====== -->
<div class="modal-bg" id="add-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h3 id="add-title">Добавить</h3>
      <div class="food-grid" id="fg"></div>
      <input class="input-field" id="amt" type="number" placeholder="Количество (мл/г)" min="1" max="500">
      <button class="btn-primary" onclick="saveMeal()">Сохранить</button>
      <button class="btn-secondary" onclick="closeM('add-modal')">Отмена</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="allergy-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h3>Записать реакцию</h3>
      <div class="section-header" style="padding-top:0">Продукт</div>
      <div class="food-grid" id="afg"></div>
      <div class="section-header">Симптомы</div>
      <div class="chips" id="symptom-chips">
        <button class="chip" onclick="togChip(this)">Сыпь</button>
        <button class="chip" onclick="togChip(this)">Покраснение</button>
        <button class="chip" onclick="togChip(this)">Рвота</button>
        <button class="chip" onclick="togChip(this)">Понос</button>
        <button class="chip" onclick="togChip(this)">Вздутие</button>
        <button class="chip" onclick="togChip(this)">Колики</button>
        <button class="chip" onclick="togChip(this)">Отек</button>
        <button class="chip" onclick="togChip(this)">Насморк</button>
      </div>
      <button class="btn-primary" onclick="saveAllergy()">Сохранить</button>
      <button class="btn-secondary" onclick="closeM('allergy-sheet')">Отмена</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Tab bar -->
<nav class="tab-bar">
  <button class="tab-item active" onclick="go('calendar',this)"><span class="icon">📅</span>Календарь</button>
  <button class="tab-item" onclick="go('tracker',this)"><span class="icon">📝</span>Трекер</button>
  <button class="tab-item" onclick="go('allergy',this)"><span class="icon">⚠️</span>Реакции</button>
  <button class="tab-item" onclick="go('recipes',this)"><span class="icon">👩‍🍳</span>Рецепты</button>
</nav>

{title:'Яблочно-грушевое пюре',e:'🍎',age:6,time:'20 мин',tags:['фрукты'],ing:'Яблоко 1 шт, груша 1 шт',steps:'1. Очистить, удалить сердцевину\n2. Нарезать мелко\n3. Запечь 15 мин при 180°C\n4. Пюрировать'},
{title:'Гречневая каша',e:'🌽',age:6,time:'20 мин',tags:['каша'],ing:'Гречка 2 ст.л., вода 200мл, масло 1/4 ч.л.',steps:'1. Промыть гречку\n2. Смолоть в муку\n3. Варить 15 мин помешивая\n4. Добавить масло'},
{title:'Индейка с брокколи',e:'🍗',age:7,time:'30 мин',tags:['мясо','обед'],ing:'Индейка 50г, брокколи 100г, масло 1 ч.л.',steps:'1. Отварить индейку 20 мин\n2. Сварить брокколи 7 мин\n3. Пюрировать вместе\n4. Добавить масло'},
{title:'Тыквенный суп',e:'🎃',age:7,time:'25 мин',tags:['суп'],ing:'Тыква 200г, картофель 50г, морковь 30г',steps:'1. Очистить и нарезать\n2. Варить 15-20 мин\n3. Пюрировать\n4. Добавить масло'},

{title:'Котлетки из кролика',e:'🐰',age:8,time:'35 мин',tags:['мясо','finger food'],ing:'Кролик 100г, кабачок 50г, овсянка 1 ст.л.',steps:'1. Мясо и кабачок через мясорубку\n2. Добавить овсянку\n3. Сформировать котлетки\n4. На пару 20-25 мин'},
{title:'Рыбное суфле',e:'🐟',age:9,time:'40 мин',tags:['рыба'],ing:'Треска 100г, морковь 30г, яйцо 1/2, молоко 30мл',steps:'1. Отварить рыбу и морковь\n2. Пюрировать\n3. Добавить желток и молоко\n4. Белок взбить, ввести\n5. Запекать 20 мин при 180°C'},

];

// ===== STATE =====
let age=6,curDate=new Date(),curMeal='',selFood=null,selAFood=null;
let log=JSON.parse(localStorage.getItem('ml')||'{}');
let allergies=JSON.parse(localStorage.getItem('al')||'[]');
function save(){try{localStorage.setItem('ml',JSON.stringify(log));localStorage.setItem('al',JSON.stringify(allergies))}catch(e){}}

// ===== NAV =====
const titles={calendar:['Прикорм','Календарь прикорма с 6 месяцев'],tracker:['Трекер','Что ел малыш сегодня'],allergy:['Реакции','Отслеживание аллергий'],recipes:['Рецепты','Блюда для малыша']};
function go(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  document.getElementById('page-title').textContent=titles[p][0];
  document.getElementById('page-subtitle').textContent=titles[p][1];
  if(p==='tracker')renderTracker();
  if(p==='allergy')renderAllergies();
  if(p==='recipes')renderRecipes('all');
}

// ===== CALENDAR =====
function setAge(v){age=parseInt(v);document.getElementById('age-text').textContent=v+' месяцев';renderProds();document.getElementById('tip-text').textContent=TIPS[age]||TIPS[12]}
function renderProds(){
  const c=document.getElementById('product-list');
  const ps=PRODS[age]||[];
  c.innerHTML=ps.map(p=>`<div class="row"><div class="row-icon">${p.e}</div><div class="row-content"><div class="row-title">${p.n}</div><div class="row-subtitle">${p.d}</div></div><span class="row-accessory ${p.t==='new'?'acc-green':p.t==='caution'?'acc-orange':'acc-red'}">${p.t==='new'?'Новый':p.t==='caution'?'Осторожно':'Нельзя'}</span></div>`).join('');
}

// ===== TRACKER =====
function dk(d){return d.toISOString().split('T')[0]}
function fmtDate(d){const t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);if(dk(d)===dk(t))return'Сегодня';if(dk(d)===dk(y))return'Вчера';const m=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];return d.getDate()+' '+m[d.getMonth()]}
function shiftDate(dir){curDate.setDate(curDate.getDate()+dir);renderTracker()}
function renderTracker(){
  document.getElementById('date-text').textContent=fmtDate(curDate);
  const k=dk(curDate),day=log[k]||{};
  let meals=0,items=0,ml=0;
  ['breakfast','lunch','dinner','snack'].forEach(m=>{
    const c=document.getElementById('m-'+m),arr=day[m]||[];
    if(arr.length)meals++;items+=arr.length;arr.forEach(i=>ml+=(i.a||0));
    c.innerHTML=arr.map((i,idx)=>`<div class="logged-item"><span class="name">${i.e} ${i.n}</span><span class="amount">${i.a} мл/г</span><button class="del-btn" onclick="delMeal('${k}','${m}',${idx})">x</button></div>`).join('');
  });
  document.getElementById('s-meals').textContent=meals;
  document.getElementById('s-items').textContent=items;
  document.getElementById('s-ml').textContent=ml;
}
function openAdd(meal){
  curMeal=meal;selFood=null;
  const names={breakfast:'Завтрак',lunch:'Обед',dinner:'Ужин',snack:'Перекус'};
  document.getElementById('add-title').textContent=names[meal];
  document.getElementById('fg').innerHTML=FOODS.map(f=>`<button class="food-cell" onclick="pickFood(this,'${f.e}','${f.n}')"><span class="emoji">${f.e}</span>${f.n}</button>`).join('');
  document.getElementById('amt').value='';
  document.getElementById('add-modal').classList.add('active');
}
function pickFood(el,e,n){document.querySelectorAll('#fg .food-cell').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selFood={e,n}}
function saveMeal(){
  if(!selFood)return;const a=parseInt(document.getElementById('amt').value)||0;
  const k=dk(curDate);if(!log[k])log[k]={};if(!log[k][curMeal])log[k][curMeal]=[];
  log[k][curMeal].push({e:selFood.e,n:selFood.n,a});save();closeM('add-modal');renderTracker();
}
function delMeal(k,m,i){if(log[k]&&log[k][m]){log[k][m].splice(i,1);save();renderTracker()}}

// ===== ALLERGY =====
function openAllergySheet(){
  selAFood=null;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  document.getElementById('afg').innerHTML=FOODS.map(f=>`<button class="food-cell" onclick="pickAFood(this,'${f.e}','${f.n}')"><span class="emoji">${f.e}</span>${f.n}</button>`).join('');
  document.getElementById('allergy-sheet').classList.add('active');
}
function pickAFood(el,e,n){document.querySelectorAll('#afg .food-cell').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selAFood={e,n}}
function togChip(el){el.classList.toggle('selected')}
function saveAllergy(){
  if(!selAFood)return;const syms=[];document.querySelectorAll('.chip.selected').forEach(c=>syms.push(c.textContent));
  if(!syms.length)return;allergies.push({food:selAFood,symptoms:syms,date:new Date().toLocaleDateString('ru-RU')});
  save();closeM('allergy-sheet');renderAllergies();
}
function renderAllergies(){
  const c=document.getElementById('allergy-list'),emp=document.getElementById('allergy-empty');
  if(!allergies.length){emp.style.display='block';c.innerHTML='';c.appendChild(emp);return}
  emp.style.display='none';
  c.innerHTML=allergies.map((a,i)=>`<div class="allergy-card"><div class="emoji">${a.food.e}</div><div class="info"><div class="food">${a.food.n}</div><div class="symptoms">${a.symptoms.join(', ')}</div><div class="date">${a.date}</div></div><button class="del-btn" onclick="delAllergy(${i})">x</button></div>`).join('');
}
function delAllergy(i){allergies.splice(i,1);save();renderAllergies()}

// ===== RECIPES =====
function renderRecipes(f){
  const c=document.getElementById('recipe-list');
  const list=f==='all'?RECIPES:RECIPES.filter(r=>r.age<=f);
  c.innerHTML=list.map((r,i)=>`<div class="recipe-card" onclick="togRecipe(${i})"><div class="recipe-top"><div class="emoji">${r.e}</div><div><div class="title">${r.title}</div><div class="meta">${r.age}+ мес · ${r.time}</div><div class="recipe-tags">${r.tags.map(t=>`<span class="recipe-tag">${t}</span>`).join('')}</div></div></div><div class="recipe-body" id="rb-${i}"><h4>Ингредиенты</h4><p>${r.ing}</p><h4>Приготовление</h4><p>${r.steps.replace(/\n/g,'<br>')}</p></div></div>`).join('');
}
function togRecipe(i){document.getElementById('rb-'+i).classList.toggle('open')}
function filterR(f,btn){document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRecipes(f)}

// ===== MODALS =====
function closeM(id){document.getElementById(id).classList.remove('active')}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('active')}));

function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}

// ===== INIT =====
renderProds();renderRecipes('all');
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
